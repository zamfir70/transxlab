## Training config for code assistant
base_model: "Qwen/Qwen2.5-7B"
method: qlora
lr: 2e-4
epochs: 2
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
lora_r: 16
lora_alpha: 32
weight_decay: 0.01
output_dir: "./output/code_assistant"
data_dir: "./data"
train_file: "train.jsonl"
input_field: "input"
output_field: "output"
