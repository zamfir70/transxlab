## Example 2: Fine-tune a code completion assistant
## Use: transxlab full -a examples/02_code_assistant/answers.yaml -d examples/02_code_assistant/data -c examples/02_code_assistant/config.yaml
task_description: "Generate code completions from natural language instructions"
task_type: generate
input_format: text
output_format: text
approach: fine-tune
base_model: "Qwen/Qwen2.5-7B"
training_method: qlora
vram_gb: 24
data_size: 10000
creativity: balanced
input_seq_len: 512
output_seq_len: 512
